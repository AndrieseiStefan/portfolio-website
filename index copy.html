<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A premium personal portfolio for a QA, UX, and product-minded professional focused on improving digital products through clarity, testing, and structured quality thinking."
    />
    <title>Quality-Driven Portfolio</title>
    <script>
      (() => {
        const storageKey = 'stefan-portfolio-theme';
        const savedTheme = window.localStorage.getItem(storageKey);
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = savedTheme === 'light' || savedTheme === 'dark'
          ? savedTheme
          : systemPrefersDark
            ? 'dark'
            : 'light';

        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
